name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Create release if cheatsheet was updated
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if merged PR has automated-update label
        id: check-label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Extract PR number from merge commit message (e.g. "Merge pull request #42 from ...")
          PR_NUMBER=$(git log -1 --pretty=%s | grep -oP '#\K[0-9]+' | head -1)
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR number found in commit message — skipping release"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Fetch labels for this PR
          LABELS=$(gh pr view "$PR_NUMBER" --json labels --jq '.labels[].name' 2>/dev/null || echo "")
          echo "PR #$PR_NUMBER labels: $LABELS"

          if echo "$LABELS" | grep -q "automated-update"; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          else
            echo "PR does not have automated-update label — skipping release"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.check-label.outputs.should_release == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Bump patch version and push tag
        if: steps.check-label.outputs.should_release == 'true'
        id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=v$NEW_VERSION" >> "$GITHUB_OUTPUT"

          git add package.json
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git tag "v$NEW_VERSION"
          git push origin main --follow-tags

      - name: Create GitHub Release
        if: steps.check-label.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.new_version }}" \
            --title "Release ${{ steps.version.outputs.new_version }}" \
            --generate-notes \
            --latest
